name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(jq -r .version manifest.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Verify tag matches manifest version
        if: github.ref_type == 'tag'
        run: |
          MANIFEST_VERSION="v$(jq -r .version manifest.json)"
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Package extension
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="pagedye-${VERSION}.zip"
          FILES="manifest.json popup scripts icons"
          [ -d images ] && FILES="$FILES images"
          zip -r "$ZIP" $FILES
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: PageDye ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}
