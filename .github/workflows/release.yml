name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(jq -r .version manifest.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run extension checks
        run: npm test

      - name: Verify tag matches manifest version
        if: github.ref_type == 'tag'
        run: |
          MANIFEST_VERSION="v$(jq -r .version manifest.json)"
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Package extension
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="pagedye-${VERSION}.zip"
          FILES="manifest.json popup options scripts icons lib Designer.png"
          [ -d images ] && FILES="$FILES images"
          zip -r "$ZIP" $FILES
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

          USERSCRIPT="pagedye-lite-${VERSION}.user.js"
          cp userscript/pagedye.user.js "$USERSCRIPT"
          echo "userscript=$USERSCRIPT" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        run: |
          # Commits land straight on main without PRs, so GitHub's
          # generate_release_notes has nothing to summarize — pull the
          # matching version's own written entry out of CHANGELOG.md instead.
          # CHANGELOG.md headers look like "### ✨ v0.7.13 更新日志" (not the
          # keepachangelog "## [x.y.z]" style this originally matched).
          VERSION="${{ steps.version.outputs.version }}"
          awk -v marker="$VERSION " '
            /^### / {
              if (found) exit
              if (index($0, marker) > 0) found=1
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "_No CHANGELOG.md entry found for ${{ steps.version.outputs.version }}._" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: PageDye ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.userscript }}
